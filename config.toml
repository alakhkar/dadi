[project]
# Whether to enable telemetry (default: true). No personal data is collected.
enable_telemetry = false

[features]
# Show the prompt playground
prompt_playground = false
# Enable multi-modal file uploads
multi_modal = false
# Enable speech to text
speech_to_text = false

[UI]
# Name of the app and chatbot
name = "Dadi AI"
# Description
description = "She will roast you. She will fix you. 👵🏾"
# Default to dark theme
default_theme = "light"
# Collapse the sidebar by default
default_collapse_content = true
# Logo shown in the header
logo = "images/dadi.png"
custom_css = "/public/custom.css"
custom_js = "/public/custom.js?v=19"

[UI.theme]
# Primary brand colour — warm henna red
primary = "#8B1A1A"
background = "#FDF6F0"
paper = "#FEF0E7"

font_family = "Playfair Display, serif"
